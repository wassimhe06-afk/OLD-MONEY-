<!DOCTYPE html>
<html>
    <head>
        <title>AURUM</title>
        <meta name = "viewport" content ="width=device-width, initial-scale= 1.0">
        <style>
            .hero {
      text-align: center;
      padding: 70px 40px;
      border-bottom: 1px solid #c9a84c22;
    }
    .hero-tag {
      font-size: 11px;
      letter-spacing: 4px;
      color: #c9a84c;
      margin-bottom: 16px;
    }
    .hero h1 {
      font-size: 48px;
      font-weight: 400;
      letter-spacing: 4px;
      color: #f0e6c8;
      margin-bottom: 14px;
    }
    .hero p { color: #e8d5a377; letter-spacing: 1px; }
    .products { padding: 50px 40px; }
    .section-title {
      font-size: 11px;
      letter-spacing: 5px;
      color: #c9a84c;
      text-align: center;
      margin-bottom: 30px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .card {
      background: #111;
      border: 1px solid #c9a84c22;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.3s;
    }
    .card:hover { border-color: #c9a84c88; }
    .card-img {
      height: 200px;
      background: #161616;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
    }
    .card-body { padding: 16px; }
    .card-name {
      font-size: 14px;
      letter-spacing: 2px;
      color: #f0e6c8;
      margin-bottom: 6px;
    }
    .card-desc {
      font-size: 12px;
      color: #e8d5a355;
      margin-bottom: 14px;
    }
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .price { color: #c9a84c; font-size: 15px; }
    .add-btn {
      background: transparent;
      border: 1px solid #c9a84c66;
      color: #c9a84c;
      padding: 6px 14px;
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
    }
    .add-btn:hover { background: #c9a84c; color: #0a0a0a; }
            *{
                margin : 0;
                padding: 0;
                box-sizing:border-box;
            }
            body{
                background-color: #0a0a0a;
                color:#e8d5a3;
                font-family: Arial;
            }
            .nav{
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 20px 40px;
                border-bottom: 1px solid #c9a84c44;
            }
            .logo{
                font-size: 24px;
                letter-spacing: 6px;
                color: #c9a84c;
            }
            .nav-links {
                display: flex;
                gap:30px;
            }
            .nav-links span {
                font-size: 13px;
                letter-spacing: 2px;
                color: #e8d5a3aa;
                cursor: pointer;
            }
            .nav-links span:hover {
                color : #c9a84c;
            }
            .cart-btn{
                background: transparent;
                border: 1px solid #c9a84c;
                color:#c9a84c;
                padding:8px 20px;
                letter-spacing: 2px;
                cursor: pointer;
                font-size: 13px;
            }
            .cart-btn:hover{
                background: #c9a84c;
                color: #0a0a0a;
            }
        </style>
    </head>
    <body>
        <!-- Hero -->
  <div class="hero">
    <div class="hero-tag">COLLECTION 2025</div>
    <h1>L'ART DU LUXE</h1>
    <p>Pièces exclusives pour l'élite moderne</p>
  </div>

  <!-- المنتجات -->
  <div class="products">
    <div class="section-title">NOS PIÈCES</div>
    <div class="grid">

      <div class="card">
        <div class="card-img">🧥</div>
        <div class="card-body">
          <div class="card-name">MANTEAU CACHEMIRE</div>
          <div class="card-desc">Laine & cachemire — Italy</div>
          <div class="card-footer">
            <span class="price">285,000 DZD</span>
            <button class="add-btn">AJOUTER</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-img">👔</div>
        <div class="card-body">
          <div class="card-name">CHEMISE OXFORD</div>
          <div class="card-desc">Coton égyptien — Slim fit</div>
          <div class="card-footer">
            <span class="price">95,000 DZD</span>
            <button class="add-btn">AJOUTER</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-img">👞</div>
        <div class="card-body">
          <div class="card-name">DERBY CUIR PATINÉ</div>
          <div class="card-desc">Cuir pleine fleur — Fait main</div>
          <div class="card-footer">
            <span class="price">175,000 DZD</span>
            <button class="add-btn">AJOUTER</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</html>
<div class="nav">
    <div class="logo">AURUM</div>
    <div class="nav-links">
        <span>COLLECTION</span>
        <span>ABOUT</span>
        <SPAN>CONTACT</SPAN>

     </div>
     <button class="cart-btn">PANIER 0</button>
</div>
</body>
</html>
